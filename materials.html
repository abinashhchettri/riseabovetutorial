<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Study Materials — Rise Above</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="images/logo.png" alt="Rise Above Tutorial logo" class="logo">
        <span class="site-title">Rise Above Tutorial</span>
      </a>
      <nav class="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="courses.html">Courses</a></li>
          <li><a href="results.html">Results</a></li>
          <li><a href="faculty.html">Faculty</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button id="login-btn" class="btn outline">Login</button>
        <a href="" id="signup-btn" class="btn primary">Sign Up</a>
        <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="materials">
    <div class="container">
      <h1>Study Materials</h1>
      <p>Access course handouts, templates, and recordings (members only).</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Rise Above Tutorial — All rights reserved.</p>
    </div>
  </footer>

  <div id="auth-modal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button class="modal-close" aria-label="Close">&times;</button>
      <div class="auth-forms">
        <form id="login-form" class="auth-form">
          <h3>Login</h3>
          <label>Email<input type="email" name="email" required></label>
          <label>Password<input type="password" name="password" required></label>
          <button class="btn primary" type="submit">Login</button>
        </form>
        <form id="signup-form" class="auth-form" style="display:none;">
          <h3>Sign Up</h3>
          <label>Full name<input type="text" name="name" required></label>
          <label>Email<input type="email" name="email" required></label>
          <label>Password<input type="password" name="password" required></label>
          <button class="btn primary" type="submit">Create account</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
